<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Confeita Mais | Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root{
  --chocolate:#5A3A22;
  --dark:#2A1810;
  --caramel:#E0A868;
  --caramel-soft:#D4A373;
  --cream:#FDF8F3;
  --white:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,var(--chocolate),var(--dark));
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow-x:hidden;
  position:relative;
}

.choco-float{
  position:fixed;
  font-size:34px;
  opacity:.12;
  animation:flutuar 6s ease-in-out infinite;
  pointer-events:none;
  z-index:0;
}

.choc1{ top:8%; left:6%; }
.choc2{ top:18%; right:8%; animation-delay:1s; }
.choc3{ bottom:15%; left:8%; animation-delay:2s; }
.choc4{ bottom:10%; right:10%; animation-delay:3s; }

@keyframes flutuar{
  0%,100%{ transform:translateY(0px) rotate(0deg); }
  50%{ transform:translateY(-16px) rotate(5deg); }
}

body::before{
  content:'';
  position:fixed;
  width:500px;
  height:500px;
  background:rgba(255,255,255,.04);
  border-radius:50%;
  top:-200px;
  left:-150px;
  animation:move1 12s infinite alternate;
}

body::after{
  content:'';
  position:fixed;
  width:400px;
  height:400px;
  background:rgba(255,255,255,.03);
  border-radius:50%;
  bottom:-180px;
  right:-120px;
  animation:move2 10s infinite alternate;
}

@keyframes move1{
  from{ transform:translateY(0) translateX(0); }
  to{ transform:translateY(80px) translateX(50px); }
}

@keyframes move2{
  from{ transform:translateY(0) translateX(0); }
  to{ transform:translateY(-60px) translateX(-40px); }
}

.card{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(10px);
  border-radius:40px;
  padding:35px 25px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
  border:2px solid rgba(224,168,104,.45);
  animation:fadeUp 1s ease;
  overflow:hidden;
}

.card::after{
  content:'🍫';
  position:absolute;
  font-size:200px;
  opacity:.05;
  bottom:-50px;
  right:-40px;
  transform:rotate(-15deg);
  pointer-events:none;
}

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(40px); }
  to{ opacity:1; transform:translateY(0); }
}

.logo-container{
  position:relative;
  z-index:5;
  width:150px;
  height:150px;
  margin:15px auto 20px;
  border-radius:50%;
  padding:5px;
  background:linear-gradient(135deg,var(--caramel),#f3d1a8);
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.logo-container img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:contain;
  background:white;
  border:4px solid white;
}

.estrelas{
  color:var(--caramel);
  font-size:14px;
  letter-spacing:4px;
  margin-bottom:2px;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:48px;
  color:var(--chocolate);
}

.subtitle{
  color:var(--caramel-soft);
  font-size:12px;
  letter-spacing:2px;
  font-weight:600;
  text-transform:uppercase;
  margin-bottom:10px;
}



.section{
  margin:25px 0 15px;
  color:var(--chocolate);
  font-size:14px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.section::before,
.section::after{
  content:'';
  width:40px;
  height:1px;
  background:var(--caramel);
}

.atendentes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-bottom:25px;
}

.alisson{
  grid-column:1 / 3;
  max-width:180px;
  margin:auto;
}

.atendente{
  background:var(--cream);
  border-radius:22px;
  padding:15px;
  cursor:pointer;
  transition:.35s;
  border:1px solid transparent;
  position:relative;
  overflow:hidden;
}

.atendente::before{
  content:'';
  position:absolute;
  width:120%;
  height:120%;
  background:linear-gradient(45deg,transparent,rgba(255,255,255,.5),transparent);
  top:-120%;
  left:-120%;
  transition:.6s;
}

.atendente:hover::before{
  top:100%;
  left:100%;
}

.atendente:hover{
  transform:translateY(-5px) scale(1.03);
  background:white;
  border-color:var(--caramel);
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.atendente img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
  border:3px solid var(--caramel);
}

.atendente span{
  display:block;
  color:var(--chocolate);
  font-size:14px;
  font-weight:600;
  line-height:1.3;
}

.btn{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  text-decoration:none;
  padding:16px;
  border-radius:18px;
  margin-bottom:14px;
  font-weight:600;
  transition:.2s ease;
  position:relative;
  overflow:hidden;
}

.btn-main{
  background:var(--chocolate);
  color:white;
}

.btn-main:hover{
  background:#432a18;
}

.btn-google{
  background:white;
  border:1px solid #ddd;
  color:#555;
}

.btn-google:hover{
  background:#fafafa;
}

.btn-cnpj{
  background:linear-gradient(135deg,#8A5A2E,#5A3A22);
  color:white;
  font-weight:700;
  letter-spacing:.5px;
  box-shadow:0 6px 16px rgba(42,24,16,.3);
}

.btn-cnpj:hover{
  background:linear-gradient(135deg,#734c27,#3f2a19);
}

.google-icon{
  width:20px;
}

footer{
  margin-top:25px;
  padding-top:15px;
  border-top:1px solid rgba(0,0,0,.08);
  font-size:10px;
  color:#777;
  letter-spacing:1px;
}

@media(max-width:480px){
  .card{
    border-radius:30px;
    padding:30px 20px;
  }
  h1{
    font-size:42px;
  }
}
</style>
</head>

<body>

<script>
function enviarZap(numero,nome){
const msg = encodeURIComponent(
`Olá ${nome}! Gostaria de informações sobre os produtos da Confeita Mais 🍰`
);

window.open(
`https://wa.me/${numero}?text=${msg}`,
'_blank'
);
}


function explodirConfetes(x,y){
  const cores = ['#5A3A22','#E0A868','#D4A373','#ffffff'];
  const qtd = 18;

  for(let i=0;i<qtd;i++){
    const c = document.createElement('div');
    c.style.position='fixed';
    c.style.left = x+'px';
    c.style.top = y+'px';
    c.style.width = (5+Math.random()*5)+'px';
    c.style.height = (8+Math.random()*6)+'px';
    c.style.background = cores[Math.floor(Math.random()*cores.length)];
    c.style.borderRadius='2px';
    c.style.pointerEvents='none';
    c.style.zIndex='9999';
    c.style.opacity='1';

    const angulo = Math.random()*2*Math.PI;
    const distancia = 60 + Math.random()*90;
    const destinoX = Math.cos(angulo)*distancia;
    const destinoY = Math.sin(angulo)*distancia - 40;
    const rotacao = Math.random()*360;

    document.body.appendChild(c);

    c.animate([
      { transform:'translate(0,0) rotate(0deg)', opacity:1 },
      { transform:`translate(${destinoX}px, ${destinoY}px) rotate(${rotacao}deg)`, opacity:0 }
    ], {
      duration: 700 + Math.random()*400,
      easing:'cubic-bezier(.25,.8,.25,1)'
    });

    setTimeout(()=>c.remove(), 1200);
  }
}

document.querySelectorAll('.btn, .atendente').forEach(el=>{
  el.addEventListener('click', function(e){
    explodirConfetes(e.clientX, e.clientY);
  });
});
</script>

</body>
</html>
